<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Andev Web</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
  <link rel="stylesheet" href="style.css">
</head>

<body class="scissors">

  <div class="envelop">
    <div class="envelop__front-paper"></div>
    <div class="envelop__back-paper"></div>
    <div class="envelop__up-paper js-up-paper"></div>
    <div class="envelop__sticker js-sticker"></div>
    <div class="envelop__false-sticker"></div>

    <div class="envelop__content js-envelop-content">
      <div class="love-notes">

        <div class="note js-note">
          <div class="note__text">
            <p>
              Eu fiquei pensando em você hoje…
              E me deu um aperto saber que você não se enxerga como eu te enxergo...
            </p>
          </div>
        </div>

        <div class="note js-note">
          <div class="note__text">
            <p>
              Quando eu te chamo de “lindo”, é porque é exatamente assim que eu te vejo...
            </p>
          </div>
        </div>

        <div class="note js-note">
          <div class="note__text">
            <p>
              E mesmo com pouco tempo, eu já gosto muito de você...
            </p>
            <p>bjs♥.</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.0/gsap.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
